<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>Kígyós játék</title>
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            color: #7c53c7;
            margin-top: 30px;
        }

        #score {
            font-size: 1.5em;
            margin: 15px;
            color: #43cea2;
            font-weight: bold;
        }

        #gameCanvas {
            background: #fff;
            border: 4px solid #7c53c7;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px #7c53c733;
        }

        #restart {
            display: none;
            padding: 14px 36px;
            font-size: 1.2em;
            border-radius: 12px;
            background: #7c53c7;
            color: #fff;
            border: none;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 16px #7c53c733;
            transition: background 0.3s, transform 0.2s;
        }

        #restart:hover {
            background: #ff7eb3;
            transform: scale(1.06);
        }

        #gameover {
            color: #ad1457;
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <h1>Kígyó játék</h1>
    <div id="score">Pontszám: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="gameover">Vesztettél!</div>
    <button id="restart" onclick="startGame()">Újraindítás</button>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const box = 20;
        let snake, direction, apple, score, gameInterval, gameOver;

        function startGame() {
            snake = [{ x: 9, y: 9 }];
            direction = 'RIGHT';
            apple = randomApple();
            score = 0;
            gameOver = false;
            document.getElementById('score').textContent = "Pontszám: 0";
            document.getElementById('gameover').style.display = 'none';
            document.getElementById('restart').style.display = 'none';
            clearInterval(gameInterval);
            gameInterval = setInterval(draw, 400);
        }

        function randomApple() {
            let newApple;
            do {
                newApple = {
                    x: Math.floor(Math.random() * (canvas.width / box)),
                    y: Math.floor(Math.random() * (canvas.height / box))
                };
            } while (snake.some(part => part.x === newApple.x && part.y === newApple.y));
            return newApple;
        }

        function draw() {
            ctx.fillStyle = "#fff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Alma
            ctx.fillStyle = "#ff7eb3";
            ctx.beginPath();
            ctx.arc(apple.x * box + box / 2, apple.y * box + box / 2, box / 2 - 2, 0, 2 * Math.PI);
            ctx.fill();

            // Kígyó
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = i === 0 ? "#43cea2" : "#7c53c7";
                ctx.fillRect(snake[i].x * box, snake[i].y * box, box, box);
                ctx.strokeStyle = "#fff";
                ctx.strokeRect(snake[i].x * box, snake[i].y * box, box, box);
            }

            // Mozgatás
            let head = { x: snake[0].x, y: snake[0].y };
            if (direction === 'LEFT') head.x--;
            if (direction === 'RIGHT') head.x++;
            if (direction === 'UP') head.y--;
            if (direction === 'DOWN') head.y++;

            // Ütközés ellenőrzés
            if (
                head.x < 0 || head.x >= canvas.width / box ||
                head.y < 0 || head.y >= canvas.height / box ||
                snake.some(part => part.x === head.x && part.y === head.y)
            ) {
                clearInterval(gameInterval);
                document.getElementById('gameover').style.display = 'block';
                document.getElementById('restart').style.display = 'inline-block';
                gameOver = true;
                return;
            }

            snake.unshift(head);

            // Alma evés
            if (head.x === apple.x && head.y === apple.y) {
                score++;
                document.getElementById('score').textContent = "Pontszám: " + score;
                apple = randomApple();
            } else {
                snake.pop();
            }
        }

        document.addEventListener('keydown', function (e) {
            if (gameOver) return;
            if (e.key === 'ArrowLeft' && direction !== 'RIGHT') direction = 'LEFT';
            if (e.key === 'ArrowUp' && direction !== 'DOWN') direction = 'UP';
            if (e.key === 'ArrowRight' && direction !== 'LEFT') direction = 'RIGHT';
            if (e.key === 'ArrowDown' && direction !== 'UP') direction = 'DOWN';
        });

        startGame();
    </script>
</body>

</html>
