<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>2048</title>
    <style>
        body {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            font-family: 'Comic Sans MS', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            color: #7c53c7;
            margin-top: 30px;
        }

        #pont {
            font-size: 1.3em;
            color: #43cea2;
            margin-bottom: 12px;
            font-weight: bold;
        }

        #jatek {
            background: #fff;
            border: 3px solid #7c53c7;
            border-radius: 16px;
            box-shadow: 0 8px 32px #7c53c733;
            margin-bottom: 18px;
            margin-top: 10px;
        }

        #ujra {
            margin-top: 10px;
            padding: 10px 28px;
            font-size: 1.1em;
            border-radius: 10px;
            border: none;
            background: #7c53c7;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
        }

        #ujra:hover {
            background: #43cea2;
            transform: scale(1.07);
        }

        #vege {
            color: #ad1457;
            font-size: 1.6em;
            font-weight: bold;
            margin: 10px 0 18px 0;
            display: none;
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            border-radius: 10px;
            margin: 4px;
            background: #eee;
            color: #7c53c7;
            transition: background 0.2s, color 0.2s;
        }

        .cell.n2 {
            background: #fbc2eb;
            color: #7c53c7;
        }

        .cell.n4 {
            background: #a8edea;
            color: #7c53c7;
        }

        .cell.n8 {
            background: #ff7eb3;
            color: #fff;
        }

        .cell.n16 {
            background: #43cea2;
            color: #fff;
        }

        .cell.n32 {
            background: #7c53c7;
            color: #fff;
        }

        .cell.n64 {
            background: #ad1457;
            color: #fff;
        }

        .cell.n128 {
            background: #f3eaff;
            color: #ad1457;
        }

        .cell.n256 {
            background: #fed6e3;
            color: #ad1457;
        }

        .cell.n512 {
            background: #fff176;
            color: #ad1457;
        }

        .cell.n1024 {
            background: #ffb300;
            color: #fff;
        }

        .cell.n2048 {
            background: #43cea2;
            color: #fff;
            border: 3px solid #ff7eb3;
        }

        #tabla {
            display: grid;
            grid-template-columns: repeat(4, 60px);
            grid-template-rows: repeat(4, 60px);
            gap: 4px;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <h1>2048</h1>
    <div id="pont">Pontszám: 0</div>
    <div id="vege">Vesztettél!</div>
    <div id="jatek">
        <div id="tabla"></div>
    </div>
    <button id="ujra" onclick="indit()">Újraindítás</button>
    <script>
        const tablaElem = document.getElementById('tabla');
        const pontElem = document.getElementById('pont');
        const vegeElem = document.getElementById('vege');
        let tabla, pont, vege;

        function uresCellak() {
            let ures = [];
            for (let i = 0; i < 4; i++)
                for (let j = 0; j < 4; j++)
                    if (tabla[i][j] === 0) ures.push([i, j]);
            return ures;
        }

        function ujSzam() {
            let ures = uresCellak();
            if (ures.length === 0) return;
            let [i, j] = ures[Math.floor(Math.random() * ures.length)];
            tabla[i][j] = Math.random() < 0.9 ? 2 : 4;
        }

        function rajzol() {
            tablaElem.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell' + (tabla[i][j] ? ' n' + tabla[i][j] : '');
                    cell.textContent = tabla[i][j] === 0 ? '' : tabla[i][j];
                    tablaElem.appendChild(cell);
                }
            }
            pontElem.textContent = "Pontszám: " + pont;
        }

        function indit() {
            tabla = Array.from({ length: 4 }, () => Array(4).fill(0));
            pont = 0;
            vege = false;
            vegeElem.style.display = "none";
            ujSzam();
            ujSzam();
            rajzol();
        }

        function mozgat(sorok) {
            let valtozott = false;
            for (let i = 0; i < 4; i++) {
                let sor = sorok[i].filter(x => x !== 0);
                for (let j = 0; j < sor.length - 1; j++) {
                    if (sor[j] === sor[j + 1]) {
                        sor[j] *= 2;
                        pont += sor[j];
                        sor[j + 1] = 0;
                    }
                }
                sor = sor.filter(x => x !== 0);
                while (sor.length < 4) sor.push(0);
                if (sor.some((x, idx) => x !== sorok[i][idx])) valtozott = true;
                sorok[i] = sor;
            }
            return valtozott;
        }

        function fordit(tabla) {
            return tabla[0].map((_, i) => tabla.map(row => row[i]));
        }

        function lepes(irany) {
            if (vege) return;
            let valtozott = false;
            if (irany === 'bal') {
                valtozott = mozgat(tabla);
            } else if (irany === 'jobb') {
                tabla = tabla.map(sor => sor.reverse());
                valtozott = mozgat(tabla);
                tabla = tabla.map(sor => sor.reverse());
            } else if (irany === 'fel') {
                tabla = fordit(tabla);
                valtozott = mozgat(tabla);
                tabla = fordit(tabla);
            } else if (irany === 'le') {
                tabla = fordit(tabla);
                tabla = tabla.map(sor => sor.reverse());
                valtozott = mozgat(tabla);
                tabla = tabla.map(sor => sor.reverse());
                tabla = fordit(tabla);
            }
            if (valtozott) {
                ujSzam();
                rajzol();
                if (jatekVegeEllenorzes()) {
                    vege = true;
                    vegeElem.style.display = "block";
                }
            }
        }

        function jatekVegeEllenorzes() {
            if (uresCellak().length > 0) return false;
            // Próbáljunk minden irányban lépni, ha mindenhol ugyanaz marad, akkor vége
            for (const irany of ['bal', 'jobb', 'fel', 'le']) {
                let mentes = tabla.map(sor => sor.slice());
                let pMentes = pont;
                lepes(irany);
                let valtozott = false;
                for (let i = 0; i < 4; i++)
                    for (let j = 0; j < 4; j++)
                        if (tabla[i][j] !== mentes[i][j]) valtozott = true;
                tabla = mentes;
                pont = pMentes;
                if (valtozott) return false;
            }
            return true;
        }

        document.body.onkeydown = function (e) {
            if (e.key === "ArrowLeft") lepes('bal');
            if (e.key === "ArrowRight") lepes('jobb');
            if (e.key === "ArrowUp") lepes('fel');
            if (e.key === "ArrowDown") lepes('le');
            rajzol();
        };

        indit();
    </script>
</body>

</html>
